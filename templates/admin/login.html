{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <style>
        body {
            background:
                radial-gradient(circle at top left, #1e3a8a, transparent 30%),
                radial-gradient(circle at bottom right, #7c3aed, transparent 30%),
                #0f172a;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">

        <!-- Logo / Title -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-white/10 backdrop-blur-md border border-white/20 shadow-2xl mb-4">
                <i class="fa-solid fa-shield-halved text-4xl text-white"></i>
            </div>

            <h1 class="text-4xl font-extrabold text-white">
                Django Admin
            </h1>

            <p class="text-slate-300 mt-2">
                Admin panelga kirish
            </p>
        </div>

        <!-- Login Card -->
        <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl shadow-2xl p-8">

            {% if form.errors %}
                <div class="mb-5 bg-red-500/20 border border-red-400 text-red-100 px-4 py-3 rounded-xl">
                    Login yoki parol noto‘g‘ri.
                </div>
            {% endif %}

            <form method="post" class="space-y-6">
                {% csrf_token %}

                <!-- Username -->
                <div>
                    <label class="block text-sm font-medium text-slate-200 mb-2">
                        Username
                    </label>

                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                            <i class="fa-solid fa-user"></i>
                        </span>

                        <input
                            type="text"
                            name="username"
                            required
                            autofocus
                            placeholder="Username kiriting"
                            class="w-full pl-12 pr-4 py-3 rounded-2xl bg-white/10 border border-white/20 text-white placeholder-slate-400 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
                        >
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-slate-200 mb-2">
                        Password
                    </label>

                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                            <i class="fa-solid fa-lock"></i>
                        </span>

                        <input
                            type="password"
                            name="password"
                            required
                            placeholder="Parol kiriting"
                            class="w-full pl-12 pr-4 py-3 rounded-2xl bg-white/10 border border-white/20 text-white placeholder-slate-400 outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition"
                        >
                    </div>
                </div>

                <!-- Remember -->
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 text-slate-300">
                        <input type="checkbox"
                               class="rounded border-slate-500 bg-slate-700">
                        Remember me
                    </label>


                    <a href="#"
                       class="text-blue-300 hover:text-blue-200 transition">
                        Forgot password?
                    </a>
                </div>

                <!-- Submit -->
                <button
                    type="submit"
                    class="w-full py-3 rounded-2xl bg-gradient-to-r from-blue-600 to-purple-600 hover:scale-[1.02] hover:shadow-xl hover:shadow-purple-500/30 text-white font-semibold transition duration-300"
                >
                    <i class="fa-solid fa-right-to-bracket mr-2"></i>
                    Login
                </button>
            </form>
        </div>

        <!-- Footer -->
        <div class="text-center mt-6 text-slate-400 text-sm">
            © 2026 Django Admin Panel
        </div>

    </div>

</body>
</html>
